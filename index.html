<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>HR Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family: Helvetica ;
  background:#eef2f7;
  padding:20px;
}

.container{
  max-width:100%;
  margin:auto;
  padding:10px;
}

/* ================= SEARCH DROPDOWN ================= */
.filters{
  flex-direction:column;
  align-items:center;
}



.dropdown{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:white;
  border:1px solid #e5e7eb;
  border-radius:8px;
  max-height:200px;
  overflow-y:auto;
  display:none;
  z-index:10;
}

.dropdown div{
  padding:10px;
  cursor:pointer;
}

.dropdown div:hover{
  background:#f3f4f6;
}

/* CARD = MOBILE WIDTH */
.card{
  width:100%;
  max-width:420px;   /* ده عرض موبايل مثالي */
  margin:auto;
  background:#fff;
  border-radius:16px;
  padding:16px;
  border:1px solid #e5e7eb;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header{
  text-align:center;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
  margin-bottom:10px;
}
.filters{
  display:flex;
  gap:15px;
  justify-content:center;
  margin-bottom:15px;
}

.btn-box{
  width:100%;
  max-width:420px;
}

.big-btn{
  width:100%;
  padding:14px;
  font-size:14px;
  font-weight:800;
  border:none;
  border-radius:12px;
  background:#1d4ed8;
  color:white;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.menu{
  position:absolute;
  top:110%;
  left:0;
  right:0;
  background:white;
  border:1px solid #e5e7eb;
  border-radius:10px;
  max-height:none;
  overflow-y:auto;
  display:none;
  z-index:10;
}

.menu div{
  padding:10px;
  cursor:pointer;
  font-weight:600;
}

.menu div:hover{
  background:#f3f4f6;
}
.company{
  font-size:20px;
  font-weight:900;
}

/* ROW = VERTICAL STYLE (مش أفقي قوي) */
.row{
  display:flex;
  flex-direction:column;   /* مهم جدًا */
  align-items:flex-start;
  gap:4px;
  padding:10px 0;
  border-bottom:1px solid #f1f1f1;
}
/* LABEL */
.label{
  color:#000;
  font-weight:700;
  font-size:14px;
}


/* VALUE */
.value{
  color:#000;
  font-weight:900;
  font-size:16px;
}

/* ================= NET ================= */
.net{
  margin-top:12px;
  padding:12px;
  background:#1d4ed8;
  color:white;
  font-weight:900;
  border-radius:10px;
  text-align:center;
}

/* ================= ACTIONS ================= */
.actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}
  
button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1d4ed8;
  color:white;
  font-weight:700;
  cursor:pointer;
}

}</style>
</head>

<body>

<div class="container">

<!-- FILTERS -->
<div class="filters">

  <div class="btn-box">
    <button id="branchBtn" class="big-btn">اختر الفرع</button>
    <div id="branchMenu" class="menu"></div>
  </div>

  <div class="btn-box">
    <button id="empBtn" class="big-btn">اختر الموظف</button>
    <div id="empMenu" class="menu"></div>
  </div>


</div>
<!-- CARD -->
<div class="card" id="card">

  <div class="header">
    <div class="company">نظام الرواتب HR</div>
    <div style="font-size:12px;color:#777;">Payroll System</div>
  </div>

  <div id="content"></div>

  <div class="net" id="netBox">صافي المرتب: 0</div>

  <div class="footer">
    <div style="font-size:12px;color:#777;">Verified Document</div>
  </div>

</div>

<div class="actions">
  <button onclick="downloadImage()">تحميل JPG</button>
  <button onclick="window.print()">طباعة PDF</button>
  <button onclick="shareImage()">مشاركة</button>
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxdGxOn1CpsqwQuXQJ8OzIsU-2ewJx9XEE4VL1KSFeUN7gHXs5Dr8XUleZPRxV8sbef/exec";

let data=[];

/* ================= SAFE FORMAT ================= */
function format(v){
  if(v===null||v===undefined||v==="") return 0;
  if(typeof v==="string") return v;
  if(isNaN(v)) return v;
  return Number(v).toLocaleString("en-US");
}

/* ================= STATE ================= */
let selectedBranch="";
let selectedEmployee="";

/* ================= LOAD DATA ================= */
async function loadData(){
  const res=await fetch(API_URL);
  data=await res.json();

  initButtons();
}

/* ================= INIT BUTTONS ================= */
function initButtons(){

  const branches=[...new Set(data.map(x=>x["الفرع"]))];

  const bMenu=document.getElementById("branchMenu");

  bMenu.innerHTML=branches.map(b=>
    `<div onclick="selectBranch('${b}')">${b}</div>`
  ).join("");

  updateEmployees();
}

/* ================= SELECT BRANCH ================= */
function selectBranch(v){
  selectedBranch = v;

  document.getElementById("branchBtn").innerText = v;
  document.getElementById("branchMenu").style.display = "none";

  // ❌ مهم: ممنوع نجيب أول موظف أو نعمل render هنا
  selectedEmployee = "";
  document.getElementById("empBtn").innerText = "اختر الموظف";

  updateEmployees();

  
}

/* ================= UPDATE EMPLOYEES ================= */
function updateEmployees(){

  const employees = [...new Set(
    data
      .filter(x => !selectedBranch || x["الفرع"] === selectedBranch)
      .map(x => x["الموظف"])
  )];

  const empMenu = document.getElementById("empMenu");

  empMenu.innerHTML = employees.map(e =>
    `<div onclick="selectEmployee('${e}')">${e}</div>`
  ).join("");
}

/* ================= SELECT EMPLOYEE ================= */
function selectEmployee(v){
  selectedEmployee = v;

  document.getElementById("empBtn").innerText = v;
  document.getElementById("empMenu").style.display = "none";

  // ✅ العرض فقط هنا
  render();
}
/* ================= VALUES ================= */
function bVal(){ return selectedBranch; }
function eVal(){ return selectedEmployee; }

/* ================= MAIN RENDER ================= */
function render(){

  const row=data.find(x=>
    (!bVal()||x["الفرع"]===bVal())&&
    (!eVal()||x["الموظف"]===eVal())
  );

  if(!row)return;

  document.getElementById("content").innerHTML="";

  if("التحويلات" in row){
    renderPilot(row);
  }else{
    renderEmployee(row);
  }

  document.getElementById("netBox").innerText=
    "إجمالي الراتب: "+format(row["الاجمالى"]);

 
}

/* ================= EMPLOYEE ================= */
function renderEmployee(row){

  const fields=[
    ["الفرع",row["الفرع"]],
    ["الموظف",row["الموظف"]],
    ["قيمة الساعة",row["قيمة الساعه"]],
    ["عدد الساعات",row["عدد الساعات"]],
    ["عدد الايام",row["عدد الايام"]],
    ["الاضافي",row["الاضافي"]],
    ["التاخيرات",row["التاخيرات"]],
    ["خصم",row["خصم"]],
    ["صافى الساعات",row["صافى الساعات"]],
    ["المرتب",row["المرتب"]],
    ["السلف",row["السلف"]],
    ["العجز",row["العجز"]],
    ["تامينات",row["تامينات"]],
    ["صافى المرتب",row["صافى المرتب"]],
      ["حافز",row["حافز"]],
  ];

  let html="";
  fields.forEach(f=>{
    html+=`
      <div class="row">
        <div class="label">${f[0]}</div>
        <div class="value">${format(f[1])}</div>
      </div>
    `;
  });

  document.getElementById("content").innerHTML=html;
}

/* ================= PILOT ================= */
function renderPilot(row){

  const fields = [
    ["الفرع", row["الفرع"]],
    ["الموظف", row["الموظف"]],
    ["عدد الايام", row["عدد الايام"]],
    ["عدد الساعات", row["عدد الساعات"]],
    ["متوسط الساعات", row["متوسط الساعات"]],
    ["التاخيرات", row["التاخيرات"]],
    ["خصم", row["خصم"]],
    ["صافى الساعات", row["صافى الساعات"]],
    ["المرتب الساعات", row["المرتب الساعات"]],
    ["التحويلات", row["التحويلات"]],
    ["قيمة التحويلات", row["قيمة التحويلات"]],
    ["الاوردرات", row["الاوردرات"]],
    ["قيمة الاوردرات", row["قيمة الاوردرات"]],
    ["المرتب", row["المرتب"]],
    ["السلف", row["السلف"]],
    ["العجز", row["العجز"]],
    ["تامينات", row["تامينات"]],
    ["صافى المرتب", row["صافى المرتب"]],
    ["حافز", row["حافز"]],
  ];

  let html = "";

  fields.forEach(f => {
    html += `
      <div class="row">
        <div class="label">${f[0]}</div>
        <div class="value">${format(f[1])}</div>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}
/* ================= MENU TOGGLE ================= */
document.getElementById("branchBtn").onclick=()=>{
  toggle("branchMenu");
};

document.getElementById("empBtn").onclick=()=>{
  toggle("empMenu");
};

function toggle(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block" ? "none" : "block";
}

/* ================= CLOSE OUTSIDE ================= */
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".btn-box")){
    document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
  }
});

/* ================= EXPORT ================= */
function downloadImage(){
  html2canvas(document.getElementById("card"),{scale:2}).then(c=>{
    const a=document.createElement("a");
    a.href=c.toDataURL("image/jpeg");
    a.download="salary.jpg";
    a.click();
  });
}

function shareImage(){
  html2canvas(document.getElementById("card"),{scale:2}).then(c=>{
    c.toBlob(b=>{
      const f=new File([b],"salary.jpg",{type:"image/jpeg"});
      if(navigator.canShare&&navigator.canShare({files:[f]})){
        navigator.share({files:[f]});
      }
    });
  });
}

/* ================= START ================= */
loadData();

</script>

</body>
</html>
